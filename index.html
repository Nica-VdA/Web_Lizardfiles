<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #bf910a;
        }
        #setupScreen {
            width: 100%;
            height: 100%;
            background-image: url('img_neutraal/neutraal.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #setupButton {
            padding: 20px 40px;
            background-color: #991c1f;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            font-family: 'Libre Franklin', sans-serif;
            color: #dadada;
            cursor: pointer;
            z-index: 10;
            margin-top: -100px;
        }
        #dossiersScreen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            background-color: #bf910a;
        }
        #dossiersImage {
            width: 100%;
            height: 80%;
            object-fit: contain;
        }
        #startGameButton {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 40px;
            background-color: #991c1f;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            font-family: 'Libre Franklin', sans-serif;
            color: #dadada;
            cursor: pointer;
            z-index: 10;
        }
        #neutraal {
            width: 100%;
            height: 100%;
            background-image: url('img_neutraal/neutraal.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }
        #imageDisplay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            object-fit: contain;
            background-color: #bf910a;
        }
    </style>
</head>
<body>
    <div id="setupScreen">
        <button id="setupButton">Bord set-up</button>
    </div>
    <div id="dossiersScreen">
        <img id="dossiersImage" src="" alt="Dossiers">
        <button id="startGameButton">Start het spel</button>
    </div>
    <div id="neutraal"></div>
    <img id="imageDisplay" src="" alt="image woningen">
    <script>
        const arrowImages = ['img_woning/connectiehuizen.png'];
        const bonusImages = ['img_bonus/bonusoptioneeldobbelen.png', 'img_bonus/bonusoptioneeldraaien.png', 'img_bonus/bonusoptioneelteleportatie.png', 'img_bonus/bonusoptioneelwisselen.png', 'img_bonus/bonusverplichtdobbelen.png', 'img_bonus/bonusverplichtdraaien.png', 'img_bonus/bonusverplichtteleportatie.png', 'img_bonus/bonusverplichtwisselen.png'];
        const towersImages = ['img_torens/connectiezendmasten.png'];
        const dossiersImages = ['img_dossiers/Screenshot_20251219_182247_Instagram.jpg', 'img_dossiers/Screenshot_20251219_182259_Instagram.jpg', 'img_dossiers/tumblr_77fd992ca8398976f2857bf1d15beacf_c2fa44a5_2048.jpg', 'img_dossiers/Tumblr_l_71872778406592.jpg'];
        const setupScreen = document.getElementById('setupScreen');
        const dossiersScreen = document.getElementById('dossiersScreen');
        const neutraal = document.getElementById('neutraal');
        const imageDisplay = document.getElementById('imageDisplay');
        const setupButton = document.getElementById('setupButton');
        const startGameButton = document.getElementById('startGameButton');
        const dossiersImage = document.getElementById('dossiersImage');
        let isDisplaying = false;
        let timeoutId = null;
        let honingIndex = 0;

        setupButton.addEventListener('click', () => {
            setupScreen.style.display = 'none';
            const randomDossier = dossiersImages[Math.floor(Math.random() * dossiersImages.length)];
            dossiersImage.src = randomDossier;
            dossiersScreen.style.display = 'block';
        });

        startGameButton.addEventListener('click', () => {
            dossiersScreen.style.display = 'none';
            neutraal.style.display = 'block';

            // Add key event listeners after game starts
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);
        });

        function handleKeyDown(event) {
            if ((event.code === 'Space' || event.code === 'ArrowUp' || event.code === 'ArrowLeft') && !isDisplaying) {
                event.preventDefault();
                isDisplaying = true;
                let imageToShow;
                if (event.code === 'Space') {
                    const randomTower = towersImages[Math.floor(Math.random() * towersImages.length)];
                    imageToShow = randomTower;
                } else if (event.code === 'ArrowUp') {
                    imageToShow = arrowImages[honingIndex];
                    honingIndex = (honingIndex + 1) % arrowImages.length;
                } else if (event.code === 'ArrowLeft') {
                    const randomBonus = bonusImages[Math.floor(Math.random() * bonusImages.length)];
                    imageToShow = randomBonus;
                }
                imageDisplay.src = imageToShow;
                imageDisplay.style.display = 'block';
                neutraal.style.display = 'none';
                timeoutId = setTimeout(() => {
                    imageDisplay.style.display = 'none';
                    neutraal.style.display = 'block';
                    isDisplaying = false;
                    timeoutId = null;
                }, 10000); // 10 seconden
            }
        }

        function handleKeyUp(event) {
            if ((event.code === 'Space' || event.code === 'ArrowUp' || event.code === 'ArrowLeft') && isDisplaying) {
                clearTimeout(timeoutId);
                timeoutId = null;
                imageDisplay.style.display = 'none';
                neutraal.style.display = 'block';
                isDisplaying = false;
            }
        }
    </script>
</body>
</html>
