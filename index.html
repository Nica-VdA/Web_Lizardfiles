<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizard Files</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #bf910a;
        }
        #neutraal {
            width: 100%;
            height: 100%;
            background-image: url('img_neutraal/neutraal.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            top: 0;
            left: 0;
        }
        #imageDisplay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            object-fit: contain;
            background-color: #bf910a;
        }
    </style>
</head>
<body>
    <div id="neutraal"></div>
    <img id="imageDisplay" src="" alt="image woningen">
    <script>
        const arrowImages = ['img_woning/connectiehuizen.png'];
        const bonusImages = ['img_bonus/bonusoptioneeldobbelen.png', 'img_bonus/bonusoptioneeldraaien.png', 'img_bonus/bonusoptioneelteleportatie.png', 'img_bonus/bonusoptioneelwisselen.png', 'img_bonus/bonusverplichtdobbelen.png', 'img_bonus/bonusverplichtdraaien.png', 'img_bonus/bonusverplichtteleportatie.png', 'img_bonus/bonusverplichtwisselen.png'];
        const towersImages = ['img_torens/connectiezendmasten.png'];
        const neutraal = document.getElementById('neutraal');
        const imageDisplay = document.getElementById('imageDisplay');
        let isDisplaying = false;
        let timeoutId = null;
        let honingIndex = 0;

        document.addEventListener('keydown', function(event) {
            if ((event.code === 'Space' || event.code === 'ArrowUp' || event.code === 'ArrowLeft') && !isDisplaying) {
                event.preventDefault();
                isDisplaying = true;
                let imageToShow;
                if (event.code === 'Space') {
                    const randomTower = towersImages[Math.floor(Math.random() * towersImages.length)];
                    imageToShow = randomTower;
                } else if (event.code === 'ArrowUp') {
                    imageToShow = arrowImages[honingIndex];
                    honingIndex = (honingIndex + 1) % arrowImages.length;
                } else if (event.code === 'ArrowLeft') {
                    const randomBonus = bonusImages[Math.floor(Math.random() * bonusImages.length)];
                    imageToShow = randomBonus;
                }
                imageDisplay.src = imageToShow;
                imageDisplay.style.display = 'block';
                neutraal.style.display = 'none';
                timeoutId = setTimeout(() => {
                    imageDisplay.style.display = 'none';
                    neutraal.style.display = 'block';
                    isDisplaying = false;
                    timeoutId = null;
                }, 10000); // 10 seconden
            }
        });

        document.addEventListener('keyup', function(event) {
            if ((event.code === 'Space' || event.code === 'ArrowUp' || event.code === 'ArrowLeft') && isDisplaying) {
                clearTimeout(timeoutId);
                timeoutId = null;
                imageDisplay.style.display = 'none';
                neutraal.style.display = 'block';
                isDisplaying = false;
            }
        });
    </script>
</body>
</html>
