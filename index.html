<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Image Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        #greenScreen {
            width: 100%;
            height: 100%;
            background-color: green;
            position: absolute;
            top: 0;
            left: 0;
        }
        #purpleScreen {
            width: 100%;
            height: 100%;
            background-color: purple;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }
        #imageDisplay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            object-fit: contain;
        }
        #exitButton {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="greenScreen"></div>
    <div id="purpleScreen"></div>
    <img id="imageDisplay" src="" alt="Random Image">
    <button id="exitButton">Verlaat dit scherm</button>
    <script>
        const images = ['img_test1/a.jpg', 'img_test1/b.jpg', 'img_test1/c.jpg', 'img_test1/d.jpg'];
        const arrowImages = ['img_pijl/Screenshot_20240423_084553_Instagram.jpg', 'img_pijl/Screenshot_20240423_084602_Instagram.jpg', 'img_pijl/Screenshot_20240423_084607_Instagram.jpg', 'img_pijl/Screenshot_20240423_084610_Instagram.jpg'];
        const greenScreen = document.getElementById('greenScreen');
        const purpleScreen = document.getElementById('purpleScreen');
        const imageDisplay = document.getElementById('imageDisplay');
        const exitButton = document.getElementById('exitButton');
        let isDisplaying = false;
        let timeoutId = null;

        exitButton.addEventListener('click', () => {
            if (isDisplaying) {
                clearTimeout(timeoutId);
                timeoutId = null;
                imageDisplay.style.display = 'none';
                exitButton.style.display = 'none';
                greenScreen.style.display = 'none';
                purpleScreen.style.display = 'block';
                isDisplaying = false;
            }
        });

        document.addEventListener('keydown', function(event) {
            if ((event.code === 'Space' || event.code === 'ArrowUp') && !isDisplaying) {
                event.preventDefault();
                isDisplaying = true;
                let currentImages;
                if (event.code === 'Space') {
                    currentImages = images;
                } else if (event.code === 'ArrowUp') {
                    currentImages = arrowImages;
                }
                const randomImage = currentImages[Math.floor(Math.random() * currentImages.length)];
                imageDisplay.src = randomImage;
                imageDisplay.style.display = 'block';
                exitButton.style.display = 'block';
                greenScreen.style.display = 'none';
                timeoutId = setTimeout(() => {
                    imageDisplay.style.display = 'none';
                    exitButton.style.display = 'none';
                    greenScreen.style.display = 'block';
                    purpleScreen.style.display = 'none';
                    isDisplaying = false;
                    timeoutId = null;
                }, 10000); // 10 seconden
            }
        });

        document.addEventListener('keyup', function(event) {
            if ((event.code === 'Space' || event.code === 'ArrowUp') && isDisplaying) {
                clearTimeout(timeoutId);
                timeoutId = null;
                imageDisplay.style.display = 'none';
                exitButton.style.display = 'none';
                greenScreen.style.display = 'block';
                purpleScreen.style.display = 'none';
                isDisplaying = false;
            }
        });
    </script>
</body>
</html>
